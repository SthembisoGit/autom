name: CI

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run checks
        run: npm run check

      - name: Build workspace
        run: npm run build
